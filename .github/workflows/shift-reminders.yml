# =============================================================================
# Shift reminders — external scheduler
# =============================================================================
# Mirrors booking-reminders.yml but for the staff scheduling reminder.
# Every 15 minutes, hits /api/cron/shift-reminders, which finds shifts
# starting in 45–75 min and sends a push (deduped via the
# schedule_shift_notifications_sent table).
#
# Required secrets (Repository settings → Secrets → Actions):
#   CRON_TARGET_URL  — deployment origin, e.g. https://tigress.vercel.app
#   CRON_SECRET      — same value as the CRON_SECRET env var in Vercel
# =============================================================================

name: Shift reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit /api/cron/shift-reminders
        env:
          CRON_TARGET_URL: ${{ secrets.CRON_TARGET_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_TARGET_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_TARGET_URL and CRON_SECRET must both be set as repository secrets."
            exit 1
          fi
          curl --fail --show-error --silent \
               --max-time 60 \
               -H "Authorization: Bearer ${CRON_SECRET}" \
               "${CRON_TARGET_URL%/}/api/cron/shift-reminders"
          echo
