<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#0F0F23" />
    <title>Offline — Tigress</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          "Plus Jakarta Sans Variable",
          system-ui,
          -apple-system,
          sans-serif;
        font-weight: 500;
        color: #ffffff;
        background-color: #0f0f23;
        background-image:
          radial-gradient(
            circle at 20% 0%,
            rgba(233, 69, 96, 0.08),
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 100%,
            rgba(26, 26, 46, 0.6),
            transparent 50%
          );
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      main {
        max-width: 360px;
        width: 100%;
        text-align: center;
        background: #141428;
        border: 1px solid #222244;
        border-radius: 16px;
        padding: 32px 24px;
      }
      .icon {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: #1a1a35;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 28px;
        font-weight: 700;
        color: #f59e0b;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 24px;
        font-size: 14px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.7);
      }
      button {
        width: 100%;
        font: inherit;
        font-weight: 600;
        font-size: 15px;
        color: #ffffff;
        background: #e94560;
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.08);
      }
      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">T</div>
      <h1>You&rsquo;re offline</h1>
      <p>
        Tigress needs an internet connection to show live table availability.
      </p>
      <button type="button" onclick="window.location.reload()">
        Try again
      </button>
    </main>
  </body>
</html>
